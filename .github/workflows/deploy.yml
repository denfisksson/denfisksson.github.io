name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      # Don't trigger if only these files changed
      - 'README.md'
      - '.gitignore'
      - '404.html'
      - 'index.html'
      - '_next/**'
      - '_not-found.html'
      - 'projects/**'
      - 'favicon.ico'

  # Allow manual trigger
  workflow_dispatch:

# Sets permissions for GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm cache clean --force
          npm ci --legacy-peer-deps

      - name: Build Next.js site
        run: npm run build
        env:
          NEXT_PUBLIC_WEB3FORMS_KEY: ${{ secrets.NEXT_PUBLIC_WEB3FORMS_KEY }}

      - name: Clean deployment directory
        run: |
          # Remove old build artifacts (but keep source code)
          rm -rf _next _not-found projects 404.html index.html _not-found.html favicon.ico fonts images .nojekyll

      - name: Copy build output
        run: |
          # Copy essential files only (no .txt debug files)
          cp out/index.html out/404.html out/_not-found.html out/favicon.ico out/.nojekyll .
          cp -r out/_next out/projects .
          [ -d out/fonts ] && cp -r out/fonts . || true
          [ -d out/images ] && cp -r out/images . || true

          # Remove debug .txt files
          find . -name "*.txt" -path "./projects/*" -delete
          find . -name "*.txt" -path "./_not-found/*" -delete

      - name: Commit and push deployment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "Deploy: Auto-build from commit ${{ github.sha }}"
            git push origin main
          else
            echo "No changes to deploy"
          fi
